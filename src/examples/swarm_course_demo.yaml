fanout_budget:
  max_concurrent: 2
  max_total_workers: 2

runners:
  openagent_teacher:
    kind: openagent
    roles: [lesson]
    metadata:
      tools: []
      permission: READONLY
      system_prompt: "You are the OpenAgent swarm course teacher. Explain the workflow as a compact teaching script."
      example: swarm-course-demo

  subprocess_checker:
    kind: subprocess
    roles: [lesson]
    metadata:
      command: "python src/examples/swarm_subprocess_worker.py"
      timeout_seconds: 10

tasks:
  lesson_walkthrough:
    role: lesson
    objective: "Produce a compact teaching script for OpenAgent swarm mode."
    context: "The audience needs to understand a decoupled swarm kernel, OpenAgent runner binding, and verification receipts."
    boundaries: "Offline mode must not call external services. Real model mode may use the configured local OpenAI-compatible gateway."
    output_schema:
      type: object
      required: [lesson_summary, demo_commands, verification]
    runner_ids:
      - openagent_teacher
      - subprocess_checker
    inputs:
      topic: "OpenAgent swarm CLI binding"
