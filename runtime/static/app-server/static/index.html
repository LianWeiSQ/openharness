<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenAgent Console</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">OA</div>
          <div>
            <h1>OpenAgent</h1>
            <p>App Bridge Console</p>
          </div>
        </div>

        <button id="new-session" class="primary-button" type="button">
          <span class="icon">+</span>
          新建会话
        </button>

        <section class="side-section">
          <div class="section-title">Sessions</div>
          <div id="session-list" class="session-list" aria-live="polite"></div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div class="eyeline">Local App Bridge</div>
            <h2 id="active-session-title">未选择会话</h2>
          </div>
          <div class="status-strip">
            <span id="health-pill" class="pill neutral">checking</span>
            <span id="model-pill" class="pill">model</span>
          </div>
        </header>

        <section class="composer">
          <textarea id="prompt-input" rows="4" placeholder="输入一个真实任务，例如：查看当前项目结构并总结 OpenAgent 的核心模块。"></textarea>
          <div id="approval-panel" class="approval-panel" hidden>
            <div>
              <div class="approval-title">Tool approval required</div>
              <pre id="approval-body" class="approval-body">-</pre>
            </div>
            <div class="approval-actions">
              <select id="approval-scope" class="control-select" aria-label="Approval scope">
                <option value="once">Once</option>
                <option value="always">Always</option>
              </select>
              <input id="approval-note" class="control-input" type="text" placeholder="Note" />
              <button id="approval-deny" class="ghost-button danger" type="button">Deny</button>
              <button id="approval-allow" class="run-button" type="button">Allow</button>
            </div>
          </div>
          <div id="question-panel" class="approval-panel question-panel" hidden>
            <div>
              <div class="approval-title">Question requested</div>
              <pre id="question-body" class="approval-body">-</pre>
            </div>
            <div class="question-actions">
              <textarea id="question-answer" rows="2" placeholder="Answer"></textarea>
              <div class="approval-actions">
                <button id="question-dismiss" class="ghost-button" type="button">Dismiss</button>
                <button id="question-reply" class="run-button" type="button">Reply</button>
              </div>
            </div>
          </div>
          <div class="composer-actions">
            <div id="turn-state" class="turn-state">idle</div>
            <button id="run-turn" class="run-button" type="button">
              <span class="run-icon">▶</span>
              运行
            </button>
          </div>
        </section>

        <section class="timeline-wrap">
          <div class="section-heading">
            <h3>运行时间线</h3>
            <button id="clear-events" class="ghost-button" type="button">清空视图</button>
          </div>
          <div id="timeline" class="timeline" aria-live="polite">
            <div class="empty-state">
              <div class="empty-title">等待任务开始</div>
              <div class="empty-copy">模型输出、工具调用、runtime warning 和最终结果会流式出现在这里。</div>
            </div>
          </div>
        </section>
      </section>

      <aside class="inspector">
        <div class="section-heading">
          <h3>Run Details</h3>
        </div>
        <dl class="details">
          <dt>Session</dt>
          <dd id="detail-session">-</dd>
          <dt>Turn</dt>
          <dd id="detail-turn">-</dd>
          <dt>Status</dt>
          <dd id="detail-status">idle</dd>
          <dt>Trace</dt>
          <dd id="detail-trace">-</dd>
        </dl>

        <div class="section-heading compact">
          <h3>Final Answer</h3>
        </div>
        <pre id="final-answer" class="final-answer">-</pre>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
